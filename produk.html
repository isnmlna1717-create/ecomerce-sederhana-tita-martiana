<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abaya Exclusive</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #1a1a1a, #2c2c2c);
        color: white;
    }

    header {
        display: flex;
        justify-content: space-between;
        padding: 20px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
    }

    .cart {
        cursor: pointer;
        position: relative;
    }

    .cart span {
        position: absolute;
        top: -8px;
        right: -10px;
        background: crimson;
        border-radius: 50%;
        padding: 3px 7px;
        font-size: 12px;
    }

    .container {
        display: flex;
        flex-wrap: wrap;
        padding: 40px;
        gap: 30px;
        justify-content: center;
    }

    .card {
        background: rgba(255,255,255,0.08);
        border-radius: 15px;
        backdrop-filter: blur(10px);
        padding: 20px;
        width: 280px;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-10px) scale(1.02);
    }

    .card img {
        width: 100%;
        border-radius: 10px;
    }

    .price {
        color: #ff4d6d;
        font-weight: bold;
        margin: 10px 0;
    }

    button {
        width: 100%;
        padding: 10px;
        border: none;
        background: #ff4d6d;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff1f4b;
    }

    /* CART PANEL */
    .cart-panel {
        position: fixed;
        right: -400px;
        top: 0;
        width: 300px;
        height: 100%;
        background: #111;
        padding: 20px;
        transition: 0.4s;
    }

    .cart-panel.active {
        right: 0;
    }

    .cart-item {
        margin-bottom: 15px;
        border-bottom: 1px solid #333;
        padding-bottom: 10px;
    }

    .total {
        margin-top: 20px;
        font-size: 18px;
    }
</style>
</head>

<body>

<header>
    <h2>Abaya Luxe</h2>
    <div class="cart" onclick="toggleCart()">
        🛒 <span id="count">0</span>
    </div>
</header>

<div class="container">

    <div class="card">
        <img src="abaya1.jpeg"width="200">
        <h3>Abaya Classic</h3>
        <p>Elegan dan minimalis</p>
        <div class="price" data-price="350000">Rp 350.000</div>
        <button onclick="addToCart('Abaya Classic', 350000)">Tambah</button>
    </div>

    <div class="card">
        <img src="abaya2.jpeg"width="200">
        <h3>Abaya Premium</h3>
        <p>Bahan silk mewah</p>
        <div class="price" data-price="500000">Rp 500.000</div>
        <button onclick="addToCart('Abaya Premium', 500000)">Tambah</button>
    </div>

    <div class="card">
        <img src="abaya3.jpeg"width="200">
        <h3>Abaya Modern</h3>
        <p>Desain kekinian</p>
        <div class="price" data-price="420000">Rp 420.000</div>
        <button onclick="addToCart('Abaya Modern', 420000)">Tambah</button>
    </div>

</div>

<!-- CART PANEL -->
<div class="cart-panel" id="cartPanel">
    <h3>Keranjang</h3>
    <div id="cartItems"></div>
    <div class="total">Total: Rp <span id="total">0</span></div>
</div>

<script>
let cart = [];

function toggleCart() {
    document.getElementById("cartPanel").classList.toggle("active");
}

function addToCart(name, price) {
    cart.push({name, price});
    updateCart();
}

function updateCart() {
    let itemsDiv = document.getElementById("cartItems");
    let total = 0;
    itemsDiv.innerHTML = "";

    cart.forEach(item => {
        total += item.price;
        itemsDiv.innerHTML += `
            <div class="cart-item">
                ${item.name} <br>
                Rp ${item.price.toLocaleString()}
            </div>
        `;
    });

    document.getElementById("total").innerText = total.toLocaleString();
    document.getElementById("count").innerText = cart.length;
}
</script>

</body>
</html>
